services:
  - type: web
    name: oni-claude-api
    env: node
    plan: free
    buildCommand: NODE_ENV=development npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: oni-claude-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://TU-FRONTEND.vercel.app

databases:
  - name: oni-claude-db
    plan: free
    databaseName: oniclaude
    user: oniclaude
